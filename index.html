<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MemX</title>
    <meta
      name="description"
      content="MemX is building next-generation memory for cloud systems."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="site-shell">
      <header class="topbar">
        <a class="brand" href="/">
          <img class="brand-mark" src="./memx-logo.svg" alt="MemX logo" />
          <span class="brand-text">MemX</span>
        </a>
        <nav class="nav">
          <a href="https://github.com/memx-lab">GitHub</a>
          <a href="https://memx-lab.github.io/docs/">Docs</a>
        </nav>
      </header>

      <main class="hero">
        <div class="hero-badge">next-generation cloud memory systems</div>
        <h1>Building next-gen memory for cloud.</h1>
        <p class="hero-text">
          MemX is building software-defined elastic memory and open-source research platforms for next-generation cloud systems. 
        </p>
        <div class="hero-actions">
          <a class="solid-button" href="https://memx-lab.github.io/docs/">
            Read Docs
          </a>
          <a class="ghost-button" href="https://github.com/memx-lab">
            GitHub
          </a>
        </div>
      </main>
    </div>
  </body>
</html>
